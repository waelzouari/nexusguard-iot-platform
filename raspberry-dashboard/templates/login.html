<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusGuard Village — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f8faf5;color:#1f2937;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

    /* Subtle bg pattern */
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(#d1fae5 1px,transparent 1px);background-size:28px 28px;opacity:0.4;z-index:0;}

    .card{position:relative;z-index:1;background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,0.06);}

    /* Logo */
    .logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px;}
    .logo-img{width:48px;height:48px;object-fit:contain;border-radius:50%;}
    .logo-name{font-size:20px;font-weight:800;color:#166534;}
    .logo-sub{font-size:12px;color:#9ca3af;}

    h1{font-size:22px;font-weight:800;color:#1f2937;text-align:center;margin-bottom:6px;}
    .subtitle{text-align:center;font-size:14px;color:#6b7280;margin-bottom:32px;line-height:1.5;}
    .subtitle strong{color:#15803d;}

    .field{margin-bottom:18px;}
    .field label{display:block;font-size:12px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
    .field input{width:100%;padding:13px 16px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:14px;color:#1f2937;background:#f9fafb;font-family:'Inter',sans-serif;outline:none;transition:all 0.2s;}
    .field input:focus{border-color:#15803d;box-shadow:0 0 0 3px rgba(21,128,61,0.08);background:#fff;}
    .field input::placeholder{color:#9ca3af;}

    .error{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:11px 16px;font-size:13px;color:#dc2626;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

    .btn-submit{width:100%;background:#15803d;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
    .btn-submit:hover{background:#166534;transform:translateY(-1px);}

    .hint{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px 16px;margin-top:20px;font-size:12px;color:#166534;text-align:center;line-height:1.6;}
    .hint strong{font-weight:700;}

    .back{display:block;text-align:center;margin-top:20px;font-size:13px;color:#9ca3af;text-decoration:none;transition:color 0.2s;}
    .back:hover{color:#15803d;}
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo-row">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-img" onerror="this.style.display='none'">
      <div>
        <div class="logo-name">NexusGuard</div>
        <div class="logo-sub">Village</div>
      </div>
    </div>

    <h1>Tableau de Bord</h1>
    <p class="subtitle">Connectez-vous pour accéder à votre<br><strong>NexusGuard Mini</strong></p>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="on">
      <div class="field">
        <label for="login-email">Identifiant</label>
        <input id="login-email" type="text" name="username" placeholder="votre identifiant" value="{{ username or '' }}" required autofocus>
      </div>
      <div class="field">
        <label for="login-password">Mot de passe</label>
        <input id="login-password" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" id="login-submit-btn" class="btn-submit">Se connecter</button>
    </form>

    <div class="hint">
      🔑 Démo : <strong>admin</strong> / <strong>nexus2026</strong><br>
      Vos identifiants personnels sont générés lors de votre commande.
    </div>

    <a href="/" class="back">← Retour au site NexusGuard Village</a>
  </div>
</body>
</html>
